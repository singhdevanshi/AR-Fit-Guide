kind = "web"
previewPath = "/"
title = "WebAR Fitness Assistant"
version = "1.0.0"
id = "artifacts/ar-fitness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18855

[services.development]
run = "pnpm --filter @workspace/ar-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ar-fitness", "run", "build" ]
publicDir = "artifacts/ar-fitness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18855"
BASE_PATH = "/"
